<!DOCTYPE html>
<html lang="nl">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">

<style>
body {
  background-color: #1e1e1e;
  color: white;
  font-family: "Segoe UI", sans-serif;
}

.header {
  background-color: #2f2f2f;
  padding: 24px;
}

.accent {
  color: #B22222;
}

.form-card {
  max-width: 500px;
  margin: 40px auto;
  background-color: #2b2b2b;
  border-radius: 10px;
}

input {
  background-color: #1e1e1e;
  color: white;
  border: 1px solid #555;
}

input:focus {
  border-color: #B22222;
  outline: none;
}

.submitbtn {
  background-color: #B22222;
  color: white;
  width: 100%;
  font-size: 16px;
  padding: 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.submitbtn:hover {
  background-color: #8B1A1A;
}

.sidebar {
  background-color: #111;
  min-height: 100vh;
}

.sidebar a {
  color: white;
}

.sidebar a:hover {
  background-color: #B22222;
}
</style>
</head>

<body>

<div class="w3-row">

  
  <div class="w3-col l2 m3 w3-bar-block sidebar">
    <h3 class="w3-center w3-padding accent">Menu</h3>
    <a href="index.html" class="w3-bar-item w3-button">Home</a>
	<a href="inlog.html" class="w3-bar-item w3-button">Inlog</a>
    
    
  </div>

  <div class="w3-col l10 m9">

   
    <div class="header w3-center w3-card">
      <h1 class="accent">Registreren</h1>
    </div>

 
    <div class="w3-card w3-padding form-card">
      <form action="inlog.html" method="POST">

        <label>Voornaam</label>
        <input class="w3-input w3-margin-bottom" type="text" name="fname" required>

        <label>Achternaam</label>
        <input class="w3-input w3-margin-bottom" type="text" name="lname" required>

        <label>Wachtwoord</label>
        <input class="w3-input w3-margin-bottom" type="password" name="password" required>

        <label>Herhaal wachtwoord</label>
        <input class="w3-input w3-margin-bottom" type="password" name="confirm_password" required>

        <label>E-mailadres</label>
        <input class="w3-input w3-margin-bottom" type="email" name="email" required>

        <label>Verjaardag</label>
        <input class="w3-input w3-margin-bottom" type="date" name="birthday" required>

        <button type="submit" class="submitbtn">Registreren</button>

      </form>
    </div>

  </div>
</div>

</body>
</html>
